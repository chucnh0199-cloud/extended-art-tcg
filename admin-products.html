<!DOCTYPE html>
<html lang="vi">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Quản lý sản phẩm</title>

<link rel="stylesheet" href="css/admin-products.css">

</head>

<body>

<div class="container">

    <div class="header">

        <div>

            <h1>📦 Quản lý sản phẩm</h1>

            <p class="subtitle">

                Thêm • Sửa • Xóa • Tìm kiếm sản phẩm

            </p>

        </div>

        <div class="header-buttons">

            <button id="add-product">
                ➕ Thêm sản phẩm
            </button>

            <button id="back-admin">
                📊 Dashboard
            </button>

            <button id="logout-btn">
                🚪 Đăng xuất
            </button>

        </div>

    </div>

    <div class="toolbar">

        <input
            type="text"
            id="search-product"
            placeholder="🔍 Tìm tên sản phẩm..."
        >

        <select id="filter-game">

            <option value="">Tất cả Game</option>

            <option value="Pokemon">Pokemon</option>

            <option value="One Piece">One Piece</option>

            <option value="Yu-Gi-Oh">Yu-Gi-Oh</option>

        </select>

        <select id="filter-series">

            <option value="">Tất cả Series</option>

        </select>

    </div>

    <div id="products-list">

        Đang tải sản phẩm...

    </div>

</div>

<!-- ======================= -->

<!-- THÊM SẢN PHẨM -->

<!-- ======================= -->

<div id="product-modal" class="modal">

    <div class="modal-content">

        <h2>➕ Thêm sản phẩm</h2>

        <input
            type="text"
            id="product-name"
            placeholder="Tên sản phẩm"
        >

        <input
            type="text"
            id="product-category"
            placeholder="Game (Pokemon, One Piece...)"
        >

        <input
            type="text"
            id="product-series"
            placeholder="Series (M1, OP15...)"
        >

        <input
            type="number"
            id="product-price"
            placeholder="Giá"
        >

        <input
            type="file"
            id="product-image"
            accept="image/*"
        >

        <div class="modal-buttons">

            <button id="save-product">

                💾 Lưu sản phẩm

            </button>

            <button id="close-product-modal">

                ❌ Hủy

            </button>

        </div>

    </div>

</div>

<!-- ======================= -->

<!-- SỬA -->

<!-- ======================= -->

<div id="edit-modal" class="modal">

    <div class="modal-content">

        <h2>✏️ Sửa sản phẩm</h2>

        <input
            type="text"
            id="edit-name"
        >

        <input
            type="text"
            id="edit-category"
        >

        <input
            type="text"
            id="edit-series"
        >

        <input
            type="number"
            id="edit-price"
        >

        <img
            id="edit-preview"
        >

        <input
            type="file"
            id="edit-image"
            accept="image/*"
        >

        <div class="modal-buttons">

            <button id="save-edit">

                💾 Lưu thay đổi

            </button>

            <button id="cancel-edit">

                ❌ Hủy

            </button>

        </div>

    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script src="js/admin-products.js"></script>

</body>

</html>
